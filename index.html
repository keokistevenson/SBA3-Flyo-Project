<!DOCTYPE html>
<html lang="en">

<head>
  <title>Frontend Mentor | Fylo data storage component</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="d-flex align-items-center justify-content-center">

    <div id="control" class="card p-3 shadow-lg rounded-3 rounded-end-circle rounded-bottom-3">
      <div class="card-body mb-3"><img src="images/logo.svg" alt="file"></div>
      <div class="card-body d-flex align-items-center justify-content-start">
        <div class="rounded-3 me-4 d-flex align-items-center justify-content-center"><img src="images/icon-document.svg"
            alt="file"></div>
        <div class="rounded-3 me-4 d-flex align-items-center justify-content-center"><img src="images/icon-folder.svg"
            alt="folder"></div>
        <div class="rounded-3 me-4 d-flex align-items-center justify-content-center"><img src="images/icon-upload.svg"
            alt="upload"></div>
      </div>
    </div>

    <div id="storage" class="card rounded-4">

      <p>You’ve used 815 GB of your storage</p>

      185 GB Left

      0 GB
      1000 GB

    </div>



  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
