<!DOCTYPE html>
<html lang="en">

<head>
  <title>Frontend Mentor | Fylo data storage component</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="d-flex align-items-center justify-content-center gap-4">

    <div id="control" class="card p-4 shadow-lg rounded-4 rounded-end-circle rounded-bottom-4">
      <div class="card-body mb-3"><img id="logo" src="images/logo.svg" alt="file"></div>
      <div class="card-body d-flex align-items-center justify-content-start">
        <div class="rounded-3 me-4 d-flex align-items-center justify-content-center"><img src="images/icon-document.svg"
            alt="file"></div>
        <div class="rounded-3 me-4 d-flex align-items-center justify-content-center"><img src="images/icon-folder.svg"
            alt="folder"></div>
        <div class="rounded-3 me-4 d-flex align-items-center justify-content-center"><img src="images/icon-upload.svg"
            alt="upload"></div>
      </div>
    </div>

    <div class="position">
      <div class="value p-1 rounded-3">185 <span class="small-letters">GB LEFT</span></div>
      <div id="storage" class="card rounded-4 p-5 shadow-lg mt-5">

        <p>You’ve used 815 GB of your storage</p>

        <div class="progress rounded-4" role="progressbar" aria-label="Near max example" aria-valuenow="815"
          aria-valuemin="0" aria-valuemax="1000">
          <div class="progress-bar rounded-3" style="width: 81.5%"> <span class="round"
              style="margin-left: 97.5%"></span></div>
        </div>


        <div class="d-flex align-items-center justify-content-between"> <span>0 GB</span> <span>1000 GB</span></div>

      </div>
    </div>


  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
